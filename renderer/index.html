<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Bot Control Center</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>Automation Bot</h1>
          <p>Electron Control Center</p>
        </div>

        <div class="sidebar-section">
          <button id="refresh-btn" class="btn btn-secondary">새로고침</button>
          <button id="clear-log-btn" class="btn btn-secondary">로그 지우기</button>
          <button id="history-btn" class="btn btn-secondary">실행 이력 확인</button>
        </div>

        <div class="sidebar-section">
          <label for="log-filter">로그 필터</label>
          <select id="log-filter" class="select">
            <option value="all">All</option>
            <option value="reddit">Reddit</option>
            <option value="instagram">Instagram</option>
            <option value="dc">DCInside</option>
            <option value="thread">Thread</option>
          </select>

          <div id="browser-options"></div>
        </div>
      </aside>

      <main class="main">
        <section class="panel">
          <div class="panel-header">
            <h2>Bot Controls</h2>
            <p>Runner 실행 / 중지 / 상태 확인</p>
          </div>

          <div id="bot-config" class="bot-config"></div>

          <div id="bot-grid" class="bot-grid"></div>
        </section>

        <section id="history-panel" class="panel history-panel hidden">
          <div class="panel-header">
            <h2>실행 이력</h2>
            <p>대상별로 실행된 기록을 확인합니다</p>
          </div>

          <div class="history-actions">
            <button id="history-back-btn" class="btn btn-secondary">뒤로</button>
          </div>

          <div id="history-list" class="history-list"></div>
        </section>

        <section class="panel log-panel">
          <div class="panel-header">
            <h2>Live Logs</h2>
            <p>stdout / stderr / system logs</p>
          </div>

          <div id="log-view" class="log-view"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
