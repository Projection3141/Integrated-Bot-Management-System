<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Bot Control Center</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>Automation Bot</h1>
          <p>Electron Control Center</p>
        </div>

        <div class="sidebar-section">
          <button id="refresh-btn" class="btn btn-secondary">새로고침</button>
          <button id="clear-log-btn" class="btn btn-secondary">로그 지우기</button>
          <button id="account-btn" class="btn btn-secondary">계정 관리</button>
          <button id="history-btn" class="btn btn-secondary">실행 이력 확인</button>
        </div>

        <div class="sidebar-section">
          <label for="log-filter">로그 필터</label>
          <select id="log-filter" class="select">
            <option value="all">All</option>
            <option value="reddit">Reddit</option>
            <option value="instagram">Instagram</option>
            <option value="dc">DCInside</option>
          </select>

          <div id="browser-options"></div>
        </div>
      </aside>

      <main class="main">
        <section class="panel">
          <div class="panel-header">
            <h2>Bot Controls</h2>
            <p>Runner 실행 / 중지 / 상태 확인</p>
          </div>

          <div id="bot-config" class="bot-config"></div>

          <div id="bot-grid" class="bot-grid"></div>
        </section>

        <section id="history-panel" class="panel history-panel hidden">
          <div class="panel-header">
            <h2>실행 이력</h2>
            <p>대상별로 실행된 기록을 확인합니다</p>
          </div>

          <div class="history-actions">
            <button id="history-back-btn" class="btn btn-secondary">뒤로</button>
          </div>

          <div id="history-list" class="history-list"></div>
        </section>

        <section id="account-panel" class="panel account-panel hidden">
          <div class="panel-header">
            <h2>계정 관리</h2>
            <p>봇 실행에 사용할 계정을 추가/삭제합니다</p>
          </div>

          <div class="account-actions">
            <button id="account-add-btn" class="btn">계정 추가</button>
            <button id="account-back-btn" class="btn btn-secondary">뒤로</button>
          </div>

          <div id="account-list" class="account-list"></div>
        </section>

        <section class="panel log-panel">
          <div class="panel-header">
            <h2>Live Logs</h2>
            <p>stdout / stderr / system logs</p>
          </div>

          <div id="log-view" class="log-view"></div>
        </section>
      </main>

      <!-- Account Add Modal -->
      <div id="account-modal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h3>계정 추가</h3>
            <button id="modal-close" class="modal-close">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label for="account-name">계정 이름</label>
              <input type="text" id="account-name" placeholder="예: main_account">
            </div>
            <div class="form-group">
              <label for="account-username">아이디</label>
              <input type="text" id="account-username" placeholder="아이디 입력">
            </div>
            <div class="form-group">
              <label for="account-password">비밀번호</label>
              <input type="password" id="account-password" placeholder="비밀번호 입력">
            </div>
          </div>
          <div class="modal-footer">
            <button id="modal-cancel" class="btn btn-secondary">취소</button>
            <button id="modal-add" class="btn">추가</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
